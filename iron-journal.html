<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Iron Journal</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#080810;--surface:#0e0e1a;--surface2:#13131f;--border:#222235;--text:#eeeeff;--muted:#7878a0;--faint:#1a1a2a;--accent:#4dffaa;--danger:#ff5566;--fs-xs:12px;--fs-sm:14px;--fs-base:16px;--fs-md:18px;--fs-lg:22px;--fs-xl:26px;--lh-tight:1.3;--lh-body:1.6;--touch:48px;--radius:12px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;font-size:var(--fs-base);line-height:var(--lh-body);min-height:100vh;-webkit-text-size-adjust:100%}
.topbar{position:sticky;top:0;z-index:200;background:rgba(8,8,16,.97);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;justify-content:space-between;align-items:center}
.topbar-title{font-family:'Oswald',sans-serif;font-size:28px;font-weight:700;font-style:normal;color:#f0f0f0;line-height:1;letter-spacing:3px;text-transform:uppercase;text-shadow:0 0 20px rgba(77,255,170,.15)}
.topbar-date{font-size:var(--fs-xs);color:var(--muted);margin-top:2px}
.topbar-right{display:flex;gap:8px;align-items:center}
.sync-indicator{font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:4px 8px;border-radius:20px;opacity:0;transition:opacity .3s;white-space:nowrap;font-family:'DM Mono',monospace}
.sync-indicator.syncing{opacity:1;color:var(--muted);border:1px solid var(--border)}
.sync-indicator.ok{opacity:1;color:var(--accent);border:1px solid var(--accent)22}
.sync-indicator.err{opacity:1;color:#ff5566;border:1px solid #ff556622}
.icon-btn{width:40px;height:40px;border:1px solid var(--border);background:transparent;color:var(--muted);border-radius:10px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.icon-btn:active{background:var(--faint);color:var(--text)}
.icon-btn.active{border-color:var(--accent);color:var(--accent)}
.day-tabs-wrap{padding:14px 20px 0;display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;align-items:center}
.day-tabs-wrap::-webkit-scrollbar{display:none}
.day-tab{flex-shrink:0;min-height:44px;padding:0 16px;border-radius:22px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Mono',monospace;font-size:var(--fs-sm);letter-spacing:.5px;cursor:pointer;display:flex;align-items:center;transition:all .2s;white-space:nowrap}
.day-tab.active{font-weight:600;color:#080810}
.add-day-btn{flex-shrink:0;width:44px;height:44px;border:1px dashed var(--border);background:transparent;color:var(--muted);border-radius:22px;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.add-day-btn:active{background:var(--faint)}
.screen{display:none;padding-bottom:40px}
.screen.active{display:block}
.day-header{margin:14px 20px 0;padding:14px 16px;border-radius:var(--radius);display:flex;justify-content:space-between;align-items:center}
.day-label{font-size:var(--fs-sm);letter-spacing:2px;text-transform:uppercase;font-weight:600}
.day-focus{font-size:var(--fs-sm);color:var(--muted);margin-top:3px}
.exercises{padding:12px 20px;display:flex;flex-direction:column;gap:12px}
.ex-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.ex-top{padding:14px 16px 12px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.ex-name{font-size:var(--fs-md);color:#eeeeff;font-family:'Playfair Display',serif;line-height:var(--lh-tight);margin-bottom:4px}
.ex-target{font-size:var(--fs-sm);color:var(--muted)}
.ex-dot{width:12px;height:12px;border-radius:50%;background:var(--faint);border:1.5px solid var(--border);flex-shrink:0;margin-top:5px;transition:all .3s}
.ex-edit-btn{width:32px;height:32px;border:none;background:transparent;color:var(--muted);font-size:16px;cursor:pointer;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ex-edit-btn:active{background:var(--faint)}
.set-table{border-top:1px solid var(--border)}
.set-header{display:grid;grid-template-columns:36px 1fr 148px 44px;background:var(--surface2);border-bottom:1px solid var(--border);padding:0 8px}
.shc{font-size:var(--fs-xs);color:var(--muted);letter-spacing:1px;text-transform:uppercase;padding:8px;font-weight:500}
.shc.c{text-align:center}
.set-row{display:grid;grid-template-columns:36px 1fr 148px 44px;border-bottom:1px solid var(--faint);align-items:center;padding:0 8px;min-height:54px;transition:background .15s}
.set-row:last-child{border-bottom:none}
.set-row.done{background:rgba(77,255,170,.05)}
.set-num{font-size:var(--fs-sm);color:var(--muted);padding:0 4px}
.set-weight{width:100%;background:transparent;border:none;color:var(--text);font-family:'DM Mono',monospace;font-size:var(--fs-md);outline:none;padding:8px}
.set-weight::placeholder{color:#2e2e4a}
.set-weight::-webkit-inner-spin-button,.set-weight::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
.stepper{display:flex;align-items:center;justify-content:center;gap:2px;padding:0 2px}
.sbtn{width:40px;height:44px;border:none;background:var(--faint);color:var(--muted);font-size:24px;font-weight:300;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:8px;flex-shrink:0;user-select:none;-webkit-user-select:none;transition:all .1s}
.sbtn:active{background:var(--border);color:var(--text)}
.sval{min-width:32px;text-align:center;font-size:var(--fs-md);color:var(--text);font-family:'DM Mono',monospace;font-weight:500}
.sval.z{color:var(--muted)}
.set-del{width:36px;height:36px;border:none;background:transparent;color:#3a3a5a;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:8px;margin:0 auto;transition:all .15s}
.set-del:active{color:var(--danger);background:rgba(255,80,80,.1)}
.add-set-btn{width:100%;min-height:44px;background:transparent;border:none;border-top:1px solid var(--border);color:var(--muted);font-family:'DM Mono',monospace;font-size:var(--fs-sm);letter-spacing:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s}
.add-set-btn:active{background:var(--faint);color:var(--text)}
.add-ex-card{margin:0 20px;border:1px dashed var(--border);border-radius:var(--radius);min-height:52px;background:transparent;color:var(--muted);font-family:'DM Mono',monospace;font-size:var(--fs-sm);letter-spacing:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;width:calc(100% - 40px)}
.add-ex-card:active{background:var(--faint)}
.save-wrap{padding:14px 20px}
.save-btn{width:100%;min-height:var(--touch);border:none;border-radius:10px;font-family:'DM Mono',monospace;font-size:var(--fs-base);letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;font-weight:600;transition:opacity .2s}
.save-btn:active{opacity:.7}
.progress-wrap{padding:16px 20px;display:flex;flex-direction:column;gap:16px}
.progress-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.progress-section-title{padding:14px 16px;font-size:var(--fs-sm);letter-spacing:1px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);background:var(--surface2)}
.vol-row{display:flex;flex-direction:column;padding:14px 16px;border-bottom:1px solid var(--faint)}
.vol-row:last-child{border-bottom:none}
.vol-ex-name{font-size:var(--fs-base);color:var(--text);font-family:'Playfair Display',serif;margin-bottom:8px}
.vol-weeks{display:flex;gap:6px;flex-wrap:wrap}
.vol-week-chip{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:52px}
.vol-week-label{font-size:var(--fs-xs);color:var(--muted)}
.vol-week-val{font-size:var(--fs-sm);color:var(--text);font-weight:500}
.vol-bar-wrap{width:52px;height:4px;background:var(--faint);border-radius:2px;margin-top:2px}
.vol-bar{height:4px;border-radius:2px;background:var(--accent);transition:width .4s}
.hist-row{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid var(--faint);font-size:var(--fs-sm);min-height:var(--touch)}
.hist-row:last-child{border-bottom:none}
.hist-empty{padding:16px;color:var(--muted);font-size:var(--fs-sm)}
.edit-wrap{padding:16px 20px;display:flex;flex-direction:column;gap:20px}
.edit-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.edit-section-title{padding:14px 16px;font-size:var(--fs-sm);letter-spacing:1px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);background:var(--surface2)}
.edit-day-row{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--faint);min-height:56px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.edit-day-row::-webkit-scrollbar{display:none}
.edit-day-row:last-child{border-bottom:none}
.edit-day-row .edit-input{flex-shrink:0;min-width:140px}
.edit-day-row .edit-del-btn{flex-shrink:0}
.edit-input{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:var(--fs-base);padding:10px 12px;border-radius:8px;outline:none}
.edit-input:focus{border-color:var(--accent)}
.edit-input::placeholder{color:var(--muted)}
.edit-del-btn{width:40px;height:40px;border:none;background:transparent;color:#3a3a5a;font-size:20px;cursor:pointer;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.edit-del-btn:active{color:var(--danger);background:rgba(255,80,80,.1)}
.edit-add-btn{width:100%;min-height:44px;background:transparent;border:none;border-top:1px solid var(--border);color:var(--muted);font-family:'DM Mono',monospace;font-size:var(--fs-sm);letter-spacing:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s}
.edit-add-btn:active{background:var(--faint);color:var(--text)}
.edit-ex-row{display:flex;flex-direction:column;gap:8px;padding:12px 16px;border-bottom:1px solid var(--faint);border:2px solid transparent;border-radius:0;transition:border-color .2s,background .2s;cursor:default}
.edit-ex-row:last-child{border-bottom:1px solid transparent}
.edit-ex-row.drag-armed{border:2px solid var(--accent);border-radius:8px;background:rgba(77,255,170,.04);cursor:grab}
.edit-ex-row.dragging{opacity:.45;background:var(--faint);border:2px solid var(--accent);border-radius:8px}
.edit-ex-row.drag-over{border-top:3px solid var(--accent)}
.edit-ex-row{display:flex;flex-direction:column;gap:8px;padding:12px 16px;border-bottom:1px solid var(--faint)}
.edit-ex-row:last-child{border-bottom:none}
.edit-ex-name-row{display:flex;gap:8px;align-items:center}
.edit-ex-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.edit-mini-input{width:56px;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:var(--fs-base);padding:8px 10px;border-radius:8px;outline:none;text-align:center}
.edit-mini-input:focus{border-color:var(--accent)}
.edit-meta-label{font-size:var(--fs-xs);color:var(--muted);letter-spacing:1px}
.color-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.coach-bar{padding:0 20px 12px}
.coach-toggle{width:100%;min-height:var(--touch);padding:0 16px;background:transparent;border:1px solid var(--border);color:var(--muted);font-family:'DM Mono',monospace;font-size:var(--fs-sm);letter-spacing:1px;text-transform:uppercase;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .2s}
.coach-toggle.open{border-color:var(--accent);color:var(--accent)}
.chat-panel{margin:0 20px 28px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;display:none;flex-direction:column}
.chat-panel.open{display:flex}
.chat-messages{height:300px;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;scroll-behavior:smooth}
.chat-messages::-webkit-scrollbar{width:3px}
.chat-messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.msg{display:flex;flex-direction:column;max-width:88%}
.msg.user{align-self:flex-end;align-items:flex-end}
.msg.assistant{align-self:flex-start}
.msg-label{font-size:var(--fs-xs);color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px}
.msg-bubble{padding:11px 14px;border-radius:12px;font-size:var(--fs-base);line-height:var(--lh-body)}
.msg.user .msg-bubble{background:#191930;border:1px solid #28284a;color:#d4d4f4;border-bottom-right-radius:4px}
.msg.assistant .msg-bubble{background:var(--surface2);border:1px solid var(--border);color:#c0bedd;border-bottom-left-radius:4px}
.chat-apply-wrap{padding:10px 14px;border-top:1px solid var(--border);display:none}
.chat-apply-btn{background:rgba(77,255,170,.1);border:1px solid var(--accent);color:var(--accent);font-family:'DM Mono',monospace;font-size:var(--fs-xs);padding:8px 14px;border-radius:20px;cursor:pointer;letter-spacing:1px}
.quick-prompts{padding:8px 12px;border-top:1px solid var(--border);display:flex;gap:6px;flex-wrap:wrap}
.qp{min-height:34px;padding:0 11px;background:transparent;border:1px solid var(--border);color:var(--muted);font-family:'DM Mono',monospace;font-size:var(--fs-xs);border-radius:20px;cursor:pointer;display:flex;align-items:center}
.qp:active{background:var(--faint)}
.chat-input-row{display:flex;gap:8px;padding:10px;border-top:1px solid var(--border);align-items:center}
.chat-input{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:11px 13px;border-radius:8px;font-size:var(--fs-base);font-family:'DM Mono',monospace;outline:none;min-height:var(--touch)}
.chat-input::placeholder{color:var(--muted)}
.send-btn{min-width:var(--touch);min-height:var(--touch);padding:0 16px;background:var(--accent);color:#080810;border:none;border-radius:8px;font-size:18px;cursor:pointer;font-weight:700;transition:opacity .2s;display:flex;align-items:center;justify-content:center}
.send-btn:disabled{opacity:.35}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius) var(--radius) 0 0;width:100%;max-width:600px;padding:24px 20px 40px;display:flex;flex-direction:column;gap:16px}
.modal-title{font-family:'Playfair Display',serif;font-size:var(--fs-lg);color:#eeeeff}
.modal-input{background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:var(--fs-base);padding:12px 14px;border-radius:8px;outline:none;width:100%}
.modal-input:focus{border-color:var(--accent)}
.modal-input::placeholder{color:var(--muted)}
.modal-row{display:flex;gap:10px;align-items:center}
.modal-mini{width:72px;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:var(--fs-base);padding:12px 10px;border-radius:8px;outline:none;text-align:center}
.modal-mini:focus{border-color:var(--accent)}
.modal-label{font-size:var(--fs-xs);color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.modal-btns{display:flex;gap:10px}
.modal-btn{flex:1;min-height:var(--touch);border:none;border-radius:10px;font-family:'DM Mono',monospace;font-size:var(--fs-sm);letter-spacing:1px;text-transform:uppercase;cursor:pointer;font-weight:600}
.modal-btn.primary{background:var(--accent);color:#080810}
.modal-btn.secondary{background:var(--faint);color:var(--muted)}
.typing{display:flex;gap:5px;align-items:center;padding:6px 2px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:blink 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.15)}}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#142214;border:1px solid var(--accent);color:var(--accent);padding:12px 24px;border-radius:24px;font-size:var(--fs-sm);opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="topbar">
  <div>
    <div class="topbar-title"><span style="color:var(--accent)">IRON</span> <span style="color:#e0e0ee;font-weight:600;letter-spacing:2px">JOURNAL</span></div>
    <div class="topbar-date" id="topDate"></div>
  </div>
  <div class="topbar-right">
    <span class="sync-indicator" id="syncIndicator"></span>
    <button class="icon-btn" id="editTabBtn" onclick="showScreen('edit')" title="Edit program">✏️</button>
    <button class="icon-btn" id="progressTabBtn" onclick="showScreen('progress')" title="Progress">📊</button>
  </div>
</div>
<div class="day-tabs-wrap" id="dayTabs"></div>
<div class="screen active" id="screen-log">
  <div id="dayHeader"></div>
  <div class="exercises" id="exercises"></div>
  <div style="padding:0 20px 8px">
    <button class="add-ex-card" onclick="openAddExModal(null)">＋ &nbsp;Add Exercise to This Day</button>
  </div>
  <div class="save-wrap">
    <button class="save-btn" id="saveBtn" onclick="saveSession()">Save Session</button>
  </div>
  <div class="coach-bar">
    <button class="coach-toggle" id="coachToggleBtn" onclick="toggleChat()">💬 &nbsp;Ask Your Coach</button>
  </div>
  <div class="chat-panel" id="chatPanel">
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-apply-wrap" id="applyWrap">
      <button class="chat-apply-btn" id="applyBtn">✓ Apply suggested program change</button>
    </div>
    <div class="quick-prompts" id="quickPrompts"></div>
    <div class="chat-input-row">
      <input class="chat-input" id="chatInput" placeholder="Ask about weights, form, program changes…"/>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">→</button>
    </div>
  </div>
</div>
<div class="screen" id="screen-progress">
  <div class="progress-wrap" id="progressWrap"></div>
</div>
<div class="screen" id="screen-edit">
  <div class="edit-wrap" id="editWrap"></div>
</div>
<div class="modal-overlay" id="addExModal" onclick="maybeCloseAddEx(event)">
  <div class="modal">
    <div class="modal-title">Add Exercise</div>
    <input class="modal-input" id="newExName" placeholder="Exercise name…"/>
    <div class="modal-row">
      <span class="modal-label">Sets</span>
      <input class="modal-mini" id="newExSets" type="number" value="3" min="1" max="20"/>
      <span class="modal-label">Reps</span>
      <input class="modal-mini" id="newExReps" type="number" value="8" min="1" max="100"/>
    </div>
    <input class="modal-input" id="newExNote" placeholder="Note (optional)…"/>
    <div class="modal-btns">
      <button class="modal-btn secondary" onclick="document.getElementById('addExModal').classList.remove('open')">Cancel</button>
      <button class="modal-btn primary" onclick="confirmAddEx()">Add Exercise</button>
    </div>
  </div>
</div>
<div class="modal-overlay" id="editExModal" onclick="maybeCloseEditEx(event)">
  <div class="modal">
    <div class="modal-title">Edit Exercise</div>
    <input class="modal-input" id="editExName" placeholder="Exercise name…"/>
    <div class="modal-row">
      <span class="modal-label">Sets</span>
      <input class="modal-mini" id="editExSets" type="number" min="1" max="20"/>
      <span class="modal-label">Reps</span>
      <input class="modal-mini" id="editExReps" type="number" min="1" max="100"/>
    </div>
    <input class="modal-input" id="editExNote" placeholder="Note (optional)…"/>
    <div class="modal-btns">
      <button class="modal-btn secondary" style="background:rgba(255,85,102,.15);color:var(--danger)" onclick="deleteExercise()">Delete</button>
      <button class="modal-btn primary" onclick="confirmEditEx()">Save</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const SYSTEM_PROMPT=`You are a strength coach for this specific lifter:
- 36yo female, ectomorph, 5ft6, 130 lbs. Goal: body recomp, not competitive.
- 10 years on-and-off lifting. Was eating 1300 cal, now targeting 2000 cal, 130-145g protein/day.
- Trains 4x/week Upper/Lower split (may change).
Current lifts: Squat ~135 lbs (bottom tightness is key limiter), Deadlift ~170 lbs (strongest), Bench ~72 lbs (endurance is limiter), OHP 45 lbs, Assisted Pull-ups Level 9, Row 55 lbs.
Rule: only add weight when ALL sets and reps are completed cleanly.
When suggesting program changes, respond naturally AND append a JSON block:
<program_change>
{"action":"add_exercise|remove_exercise|update_exercise|rename_day|add_day|remove_day","dayId":"day-id-here","data":{...}}
</program_change>
Data for add_exercise: {name, sets, reps, note}. For rename_day: {name, focus}. For update_exercise: {name, sets, reps, note}. For remove_exercise: {name}.

    setData[d.id][exId]=Array.from({length:ex.sets},()=>({weight:'',reps:0}));
  }
  return setData[d.id][exId];

// ── DRAG TO REORDER ──
function initDragList(list){
  // Disable text selection on the whole list during drag
  list.style.userSelect='none';
  list.style.webkitUserSelect='none';

  list.querySelectorAll('.edit-ex-row').forEach(row=>{
    let longPressTimer=null;
    let armed=false;
    let hasMoved=false; // track whether finger actually moved after arming

    function arm(){
      armed=true;
      hasMoved=false;
      row.classList.add('drag-armed');
      if(navigator.vibrate) navigator.vibrate(25);
      // Suppress text selection globally while armed
      document.body.style.userSelect='none';
      document.body.style.webkitUserSelect='none';
    }
    function disarm(){
      armed=false;
      hasMoved=false;
      row.classList.remove('drag-armed','dragging');
      longPressTimer=null;
      document.body.style.userSelect='';
      document.body.style.webkitUserSelect='';
    }

    function findDropTarget(y){
      // Only highlight a target that is not the dragging row itself
      const siblings=[...list.querySelectorAll('.edit-ex-row:not(.dragging)')];
      for(const el of siblings){
        const r=el.getBoundingClientRect();
        if(y<r.top+r.height/2) return el;
      }
      return null;
    }

    // TOUCH
    row.addEventListener('touchstart',e=>{
      if(e.target.tagName==='INPUT'||e.target.tagName==='BUTTON') return;
      row._touchStartY=e.touches[0].clientY;
      longPressTimer=setTimeout(()=>{ arm(); }, 300);
    },{passive:true});

    row.addEventListener('touchmove',e=>{
      if(!armed){ clearTimeout(longPressTimer); longPressTimer=null; return; }
      e.preventDefault();
      if(Math.abs(e.touches[0].clientY - row._touchStartY) > 12) hasMoved=true;
      row.classList.add('dragging');
      const target=findDropTarget(e.touches[0].clientY);
      list.querySelectorAll('.edit-ex-row').forEach(r=>r.classList.remove('drag-over'));
      if(target) target.classList.add('drag-over');
    },{passive:false});

    row.addEventListener('touchend',()=>{
      clearTimeout(longPressTimer);
      if(armed){
        // Only reorder if the finger actually moved to a new position
        if(hasMoved){
          const overEl=list.querySelector('.edit-ex-row.drag-over');
          commitReorder(list,row,overEl);
        }
        list.querySelectorAll('.edit-ex-row').forEach(r=>r.classList.remove('drag-over'));
      }
      disarm();
    });

    row.addEventListener('touchcancel',()=>{
      clearTimeout(longPressTimer);
      list.querySelectorAll('.edit-ex-row').forEach(r=>r.classList.remove('drag-over'));
      disarm();
    });

    // MOUSE
    row.addEventListener('mousedown',e=>{
      if(e.target.tagName==='INPUT'||e.target.tagName==='BUTTON') return;
      const startX=e.clientX, startY=e.clientY;
      longPressTimer=setTimeout(()=>{
        arm();
        row.classList.add('dragging');
        const onMove=ev=>{
          // Only treat as moved if past a small threshold
          if(Math.abs(ev.clientY-startY)>8) hasMoved=true;
          const target=findDropTarget(ev.clientY);
          list.querySelectorAll('.edit-ex-row').forEach(r=>r.classList.remove('drag-over'));
          if(target) target.classList.add('drag-over');
        };
        const onUp=()=>{
          if(hasMoved){
            const overEl=list.querySelector('.edit-ex-row.drag-over');
            commitReorder(list,row,overEl);
          }
          list.querySelectorAll('.edit-ex-row').forEach(r=>r.classList.remove('drag-over'));
          disarm();
          document.removeEventListener('mousemove',onMove);
          document.removeEventListener('mouseup',onUp);
        };
        document.addEventListener('mousemove',onMove);
        document.addEventListener('mouseup',onUp);
      }, 300);
    });

    row.addEventListener('mouseup',()=>{ clearTimeout(longPressTimer); });
    row.addEventListener('mouseleave',()=>{ if(!armed){ clearTimeout(longPressTimer); } });
  });
}

function commitReorder(list,dragRow,overEl){
  if(!overEl||overEl===dragRow)return;
  const dayId=list.dataset.day;
  const day=program.days.find(d=>d.id===dayId);
  if(!day)return;
  const fromIdx=day.exercises.findIndex(e=>e.id===dragRow.dataset.ex);
  const toIdx=day.exercises.findIndex(e=>e.id===overEl.dataset.ex);
  if(fromIdx===-1||toIdx===-1)return;
  const [item]=day.exercises.splice(fromIdx,1);
  day.exercises.splice(toIdx,0,item);
  saveP();renderEdit();
}

function editDayField(dayId,field,val){
  const d=program.days.find(x=>x.id===dayId);if(!d)return;
  d[field]=val;
  localStorage.setItem('ij_prog',JSON.stringify(program));
  renderTabs();
  setSyncStatus('syncing','saving…');
  debounced(()=>{
    sb.from('program').upsert({id:'singleton',updated_at:new Date().toISOString(),data:program},{onConflict:'id'})
      .then(({error})=>{
        if(error){ console.warn('program sync failed:',error.message); setSyncStatus('err','sync failed'); }
        else { setSyncStatus('ok','✓ saved'); }
      });
  });
}
function removeDay(dayId){
  if(program.days.length<=1){showToast('Need at least one day');return}
  if(!confirm('Remove this day? Your session history is kept.'))return;
  program.days=program.days.filter(d=>d.id!==dayId);
  if(currentDayId===dayId)currentDayId=program.days[0]?.id||null;
  saveP();renderTabs();renderEdit();showToast('Day removed');
}
function editExField(dayId,exId,field,val){
  const d=program.days.find(x=>x.id===dayId);if(!d)return;
  const ex=d.exercises.find(e=>e.id===exId);if(!ex)return;
  ex[field]=val;
  localStorage.setItem('ij_prog',JSON.stringify(program));
  setSyncStatus('syncing','saving…');
  debounced(()=>{
    sb.from('program').upsert({id:'singleton',updated_at:new Date().toISOString(),data:program},{onConflict:'id'})
      .then(({error})=>{
        if(error){ console.warn('program sync failed:',error.message); setSyncStatus('err','sync failed'); }
        else { setSyncStatus('ok','✓ saved'); }
      });
  });
}
function removeExFromDay(dayId,exId){
  const d=program.days.find(x=>x.id===dayId);if(!d)return;
  d.exercises=d.exercises.filter(e=>e.id!==exId);
  saveP();renderEdit();showToast('Exercise removed');
}

// ── PROGRESS SCREEN ──
function renderProgress(){
  const w=document.getElementById('progressWrap');
  const volMap={};
  sessions.forEach(sess=>{
    (sess.exercises||[]).forEach(exRef=>{
      const rows=sess.sets?.[exRef.id]||[];
      const vol=rows.reduce((s,r)=>s+(parseFloat(r.weight)||0)*r.reps,0);
      if(!vol)return;
      if(!volMap[exRef.name])volMap[exRef.name]={};
      volMap[exRef.name][sess.weekKey]=(volMap[exRef.name][sess.weekKey]||0)+vol;
    });
  });
  const allWeeks=[...new Set(sessions.map(s=>s.weekKey))].sort().slice(-6);
  const volHTML=Object.keys(volMap).length===0
    ?'<div class="hist-empty">No data yet — save some sessions first.</div>'
    :Object.entries(volMap).map(([name,weeks])=>{
        const vals=allWeeks.map(w=>weeks[w]||0);
        const mx=Math.max(...vals,1);
        const chips=allWeeks.map((w,i)=>{
          const v=vals[i];const pct=Math.round(v/mx*100);
          return`<div class="vol-week-chip">
            <div class="vol-week-label">${w.slice(5)}</div>
            <div class="vol-week-val">${v?Math.round(v).toLocaleString():'-'}</div>
            <div class="vol-bar-wrap"><div class="vol-bar" style="width:${pct}%"></div></div>
          </div>`;}).join('');
        return`<div class="vol-row"><div class="vol-ex-name">${name}</div><div class="vol-weeks">${chips}</div></div>`;
      }).join('');
  const histHTML=sessions.length===0?'<div class="hist-empty">No sessions saved yet.</div>'
    :sessions.map(s=>`<div class="hist-row"><span style="color:${s.color}">${s.day}</span><span style="color:var(--muted)">${s.date} · ${s.time}</span></div>`).join('');
  w.innerHTML=`
    <div style="font-family:'Playfair Display',serif;font-size:var(--fs-lg);font-style:italic;color:#eeeeff;padding:4px 0 8px;display:flex;align-items:center;justify-content:space-between">
      <span>Progress</span>
      <button onclick="showScreen('log')" style="border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Mono',monospace;font-size:var(--fs-xs);letter-spacing:1px;text-transform:uppercase;padding:8px 14px;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:6px">← Back</button>
    </div>
    <div class="progress-section">
      <div class="progress-section-title">Weekly Volume (lbs) — last 6 weeks</div>
      <div>${volHTML}</div>
    </div>
    <div class="progress-section">
      <div class="progress-section-title">Session History</div>
      ${histHTML}
    </div>`;
}

// ── CHAT ──
function toggleChat(){
  chatOpen=!chatOpen;
  document.getElementById('chatPanel').classList.toggle('open',chatOpen);
  const btn=document.getElementById('coachToggleBtn');
  btn.classList.toggle('open',chatOpen);
  btn.innerHTML=chatOpen?'💬 &nbsp;Close Coach':'💬 &nbsp;Ask Your Coach';
  if(chatOpen)scrollChat();
}

function buildLogCtx(){
  const d=curDay();if(!d)return'';
  const ds=setData[d.id];if(!ds)return'';
  let s=`Session: ${d.name} (${d.focus||''})\n`;
  d.exercises.forEach(ex=>{
    const rows=(ds[ex.id]||[]).filter(r=>r.reps>0);if(!rows.length)return;
    s+=`- ${ex.name}: `+rows.map((r,i)=>`Set${i+1} ${r.weight?r.weight+'lbs':'bw'}x${r.reps}`).join(', ')+` (target ${ex.sets}x${ex.reps})\n`;
  });
  return s;
}

function renderChat(){
  const c=document.getElementById('chatMessages');
  c.innerHTML=chatMsgs.map(m=>`
    <div class="msg ${m.role}">
      ${m.role==='assistant'?'<div class="msg-label">Coach</div>':''}
      <div class="msg-bubble">${m.content.replace(/<program_change>[\s\S]*?<\/program_change>/g,'').trim().replace(/\n/g,'<br>')}</div>
    </div>`).join('');
  document.getElementById('applyWrap').style.display=pendingChange?'block':'none';
  document.getElementById('quickPrompts').innerHTML=
    ["How do I progress?","Suggest an exercise swap","I'm feeling fatigued","Change my program"]
    .map(p=>`<button class="qp" onclick="quickSend('${p}')">${p}</button>`).join('');
  scrollChat();
}

function scrollChat(){const c=document.getElementById('chatMessages');setTimeout(()=>{c.scrollTop=c.scrollHeight},50)}
function showTyping(){
  const c=document.getElementById('chatMessages');
  const d=document.createElement('div');d.className='msg assistant';d.id='typing';
  d.innerHTML='<div class="msg-bubble"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>';
  c.appendChild(d);scrollChat();
}
function hideTyping(){document.getElementById('typing')?.remove()}
async function quickSend(t){await sendMessage(t)}

async function sendMessage(override){
  const inp=document.getElementById('chatInput');
  const text=override||inp.value.trim();if(!text)return;
  inp.value='';document.getElementById('sendBtn').disabled=true;
  const ctx=buildLogCtx();
  const uc=ctx?`[Session log:\n${ctx}]\n${text}`:text;
  chatMsgs.push({role:'user',content:text});renderChat();showTyping();
  const msgs=chatMsgs.slice(1).map((m,i,a)=>({role:m.role,content:m.role==='user'&&i===a.length-1?uc:m.content}));
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:SYSTEM_PROMPT,messages:msgs})});
    const data=await res.json();hideTyping();
    const reply=(data.content||[]).map(b=>b.text||'').join('')||'No response.';
    const match=reply.match(/<program_change>([\s\S]*?)<\/program_change>/);
    pendingChange=match?JSON.parse(match[1].trim()):null;
    chatMsgs.push({role:'assistant',content:reply});
  }catch{hideTyping();chatMsgs.push({role:'assistant',content:'Connection error — please try again.'});pendingChange=null;}
  renderChat();document.getElementById('sendBtn').disabled=false;
}

document.getElementById('applyBtn').addEventListener('click',()=>{
  if(!pendingChange)return;
  const{action,dayId,data}=pendingChange;
  const day=program.days.find(d=>d.id===dayId);
  if(action==='add_exercise'&&day){day.exercises.push({id:uid(),...data});showToast('Exercise added')}
  else if(action==='remove_exercise'&&day){day.exercises=day.exercises.filter(e=>e.name!==data.name);showToast('Exercise removed')}
  else if(action==='update_exercise'&&day){const ex=day.exercises.find(e=>e.name===data.name);if(ex)Object.assign(ex,data);showToast('Exercise updated')}
  else if(action==='rename_day'&&day){if(data.name)day.name=data.name;if(data.focus)day.focus=data.focus;showToast('Day renamed')}
  else if(action==='add_day'){program.days.push({id:duid(),color:DAY_COLORS[program.days.length%DAY_COLORS.length],exercises:[],...data});showToast('Day added')}
  else if(action==='remove_day'&&day){program.days=program.days.filter(d=>d.id!==dayId);if(currentDayId===dayId)currentDayId=program.days[0]?.id||null;showToast('Day removed')}
  saveP();pendingChange=null;renderTabs();renderLog();document.getElementById('applyWrap').style.display='none';
});

document.getElementById('chatInput').addEventListener('keydown',e=>{if(e.key==='Enter')sendMessage()});

function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

init();
</script>
